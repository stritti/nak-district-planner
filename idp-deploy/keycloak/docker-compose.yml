version: "3.8"

services:
  keycloak:
    image: quay.io/keycloak/keycloak:26.5
    command: start-dev
    container_name: keycloak-oidc
    environment:
      # Database Configuration
      KC_DB: postgres
      KC_DB_URL_HOST: keycloak-db
      KC_DB_URL_DATABASE: ${KEYCLOAK_DB_NAME:-keycloak}
      KC_DB_USERNAME: ${KEYCLOAK_DB_USER:-keycloak}
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD:-keycloak_dev_pw}
      
      # Admin Credentials
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KC_BOOTSTRAP_ADMIN_USERNAME:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KC_BOOTSTRAP_ADMIN_PASSWORD:-admin_dev_pw}
      
      # HTTP & Hostname
      KC_HOSTNAME: ${KC_HOSTNAME:-keycloak.localhost}
      KC_HOSTNAME_PATH: /
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
      KC_STRICT_HTTPS: "false"
      
      # Proxy Configuration
      KC_PROXY: edge
      KC_PROXY_HEADERS: xforwarded
      
      # Logging
      KC_LOG_LEVEL: ${KC_LOG_LEVEL:-info}
      KC_FEATURES: "preview"
      
    ports:
      - "8080:8080"
    depends_on:
      keycloak-db:
        condition: service_healthy
    networks:
      - idp_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health/ready"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  keycloak-db:
    image: postgres:16-alpine
    container_name: keycloak-db
    environment:
      POSTGRES_DB: ${KEYCLOAK_DB_NAME:-keycloak}
      POSTGRES_USER: ${KEYCLOAK_DB_USER:-keycloak}
      POSTGRES_PASSWORD: ${KEYCLOAK_DB_PASSWORD:-keycloak_dev_pw}
    volumes:
      - keycloak_db:/var/lib/postgresql/data
    networks:
      - idp_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  keycloak_db:
    driver: local

networks:
  idp_net:
    driver: bridge
