services:
  backend:
    build: ./services/backend
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  worker:
    build: ./services/backend
    command: uv run celery -A app.celery_app worker --loglevel=info
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  frontend:
    build: ./services/frontend
    ports:
      - "80:80"
    depends_on:
      - backend

  db:
    # NOTE: PG18+ requires mount at /var/lib/postgresql (not /data) so it can
    # create a major-version-specific subdirectory (e.g. 18/data) internally.
    # This enables future pg_upgrade --link across major versions.
    image: postgres:18-alpine
    env_file: .env
    volumes:
      - ./postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  db-test:
    image: postgres:18-alpine
    env_file: .env
    environment:
      POSTGRES_DB: nak_planner_test
    volumes:
      - ./postgres_data_test:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d nak_planner_test"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    volumes:
      - ./redis_data:/data
