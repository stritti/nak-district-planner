version: '3.8'

services:
  keycloak:
    image: quay.io/keycloak/keycloak:26.5.6
    command: start
    environment:
      KC_DB: postgres
      KC_DB_URL_HOST: db
      KC_DB_URL_DATABASE: ${KEYCLOAK_DB_NAME:-keycloak}
      KC_DB_USERNAME: ${KEYCLOAK_DB_USER:-keycloak}
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD:-changeme}
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-changeme}
      KC_HOSTNAME: ${KC_HOSTNAME:-auth2.5tritti.de}
      KC_HOSTNAME_PROTOCOL: https
      KC_HOSTNAME_PORT: 443
      KC_PROXY: edge
      KC_HTTP_ENABLED: "true"
      KC_PROXY_HEADERS: xforwarded
      # Logging
      KC_LOG_LEVEL: info
    depends_on:
      db:
        condition: service_healthy
    networks:
      - traefik_net
      - backend
    labels:
      - traefik.enable=true
      - traefik.http.routers.keycloak.rule=Host(`auth2.5tritti.de`)
      - traefik.http.routers.keycloak.entrypoints=websecure
      - traefik.http.routers.keycloak.tls=true
      - traefik.http.routers.keycloak.tls.certresolver=letsencrypt
      - traefik.http.services.keycloak.loadbalancer.server.port=8080
      - traefik.http.services.keycloak.loadbalancer.server.scheme=http

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ${KEYCLOAK_DB_NAME:-keycloak}
      POSTGRES_USER: ${KEYCLOAK_DB_USER:-keycloak}
      POSTGRES_PASSWORD: ${KEYCLOAK_DB_PASSWORD:-changeme}
    volumes:
      - keycloak_db:/var/lib/postgresql/data
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${KEYCLOAK_DB_USER:-keycloak} -d ${KEYCLOAK_DB_NAME:-keycloak}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  keycloak_db:

networks:
  traefik_net:
    external: true
    name: traefik_net
  backend:
    driver: bridge
