name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  packages: write

env:
  NODE_VERSION: '24'

jobs:
  release:
    name: Analyze Commits & Create Release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      should_release: ${{ steps.check.outputs.should_release }}
      changelog_content: ${{ steps.changelog.outputs.content }}

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Get latest tag
        id: latest_tag
        run: |
          # Get the most recent tag or first commit if no tags
          TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$TAG" ]; then
            # No tags exist - use first commit
            TAG=$(git rev-list --max-parents=0 HEAD --format="%(refname:short)" 2>/dev/null | head -1)
            [ -z "$TAG" ] && TAG="HEAD"
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "has_tags=true" >> $GITHUB_OUTPUT

      - name: Analyze commits
        id: check
        run: |
          TAG="${{ steps.latest_tag.outputs.tag }}"

          # Get commits since last tag or since beginning
          if [ "$TAG" = "HEAD" ] || ! git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "No previous tag found, analyzing all commits"
            COMMITS=$(git log --format="%s" | head -100)
          else
            COMMITS=$(git log "$TAG..HEAD" --format="%s" | head -100)
          fi

          echo "Commits since last release:"
          echo "$COMMITS"
          echo "---"

          # Parse commits for conventional commit types
          FEAT=false
          FIX=false
          BREAKING=false

          while IFS= read -r msg; do
            [ -z "$msg" ] && continue
            if echo "$msg" | grep -qi "^feat"; then FEAT=true; fi
            if echo "$msg" | grep -qi "^fix"; then FIX=true; fi
            if echo "$msg" | grep -qi "BREAKING CHANGE\|!:\|breaking change"; then BREAKING=true; fi
          done <<< "$COMMITS"

          echo "feat=$FEAT" >> $GITHUB_OUTPUT
          echo "fix=$FIX" >> $GITHUB_OUTPUT
          echo "breaking=$BREAKING" >> $GITHUB_OUTPUT

          # Determine if we should release (default to true if we have any significant commits)
          SHOULD_RELEASE="true"
          if [ "$BREAKING" = true ] || [ "$FEAT" = true ] || [ "$FIX" = true ]; then
            SHOULD_RELEASE="true"
          fi
          echo "should_release=$SHOULD_RELEASE" >> $GITHUB_OUTPUT

      - name: Calculate next version
        id: version
        run: |
          TAG="${{ steps.latest_tag.outputs.tag }}"

          # Try to extract version from tag
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            CURRENT="${TAG#v}"
            # Check if it looks like a semver
            if echo "$CURRENT" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+'; then
              MAJOR=$(echo $CURRENT | cut -d. -f1)
              MINOR=$(echo $CURRENT | cut -d. -f2)
              PATCH=$(echo $CURRENT | cut -d. -f3)
            else
              MAJOR=0
              MINOR=0
              PATCH=0
            fi
          else
            MAJOR=0
            MINOR=0
            PATCH=0
          fi

          if [ "${{ steps.check.outputs.breaking }}" = true ]; then
            MAJOR=$((MAJOR + 1))
            MINOR=0
            PATCH=0
          elif [ "${{ steps.check.outputs.feat }}" = true ]; then
            MINOR=$((MINOR + 1))
            PATCH=0
          elif [ "${{ steps.check.outputs.fix }}" = true ]; then
            PATCH=$((PATCH + 1))
          else
            # No significant changes - patch bump
            PATCH=$((PATCH + 1))
          fi

          NEW_VERSION="$MAJOR.$MINOR.$PATCH"
          echo "current=$MAJOR.$MINOR.$PATCH" >> $GITHUB_OUTPUT
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Install changelog generator
        run: |
          npm install -g changelogen

      - name: Generate changelog
        id: changelog
        run: |
          # Create a basic changelog entry
          TAG="${{ steps.version.outputs.tag }}"
          DATE=$(date +%Y-%m-%d)

          {
            echo "## [$TAG] - $DATE"
            echo ""
            echo "### Features"
            git log --format="* %s (%h)" | grep -i "^.*feat" | head -10 || echo "* (None)"
            echo ""
            echo "### Bug Fixes"
            git log --format="* %s (%h)" | grep -i "^.*fix" | head -10 || echo "* (None)"
            echo ""
            echo "### Other Changes"
            git log --format="* %s (%h)" | grep -vi "^.*feat\|^.*fix" | head -10 || echo "* (None)"
          } > release_notes.md

          # Read and escape for output
          CONTENT=$(cat release_notes.md | head -30 | tr '\n' ' ' | sed 's/"/\\"/g')
          echo "content=$CONTENT" >> $GITHUB_OUTPUT

          # Prepend to CHANGELOG.md
          {
            cat release_notes.md
            echo ""
            cat CHANGELOG.md 2>/dev/null || echo "# Changelog"
          } > CHANGELOG_NEW.md
          mv CHANGELOG_NEW.md CHANGELOG.md

      - name: Update versions
        if: steps.check.outputs.should_release == 'true'
        run: |
          NEW_VER="${{ steps.version.outputs.version }}"

          # Update root package.json
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('./package.json', 'utf8'));
            pkg.version = '$NEW_VER';
            fs.writeFileSync('./package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

          # Update services/frontend/package.json
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('./services/frontend/package.json', 'utf8'));
            pkg.version = '$NEW_VER';
            fs.writeFileSync('./services/frontend/package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

          # Update services/backend/pyproject.toml
          sed -i "s/^version = \".*\"/version = \"$NEW_VER\"/" services/backend/pyproject.toml

      - name: Create Release Commit and Tag
        if: steps.check.outputs.should_release == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          TAG="${{ steps.version.outputs.tag }}"

          # Stage all changes
          git add -A

          # Commit
          git commit -m "chore: release $TAG"

          # Create tag
          git tag -a "$TAG" -m "Release $TAG"

          # Push with tags
          git push origin main --follow-tags

  docker-build:
    name: Build Docker Images
    needs: release
    if: needs.release.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [backend, frontend]
        include:
          - service: backend
            context: services/backend
          - service: frontend
            context: services/frontend

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.release.outputs.tag }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}/${{ matrix.service }}
          tags: |
            type=semver,pattern={{version}},value=${{ needs.release.outputs.version }}
            type=semver,pattern={{major}}.{{minor}},value=${{ needs.release.outputs.version }}
            type=semver,pattern={{major}},value=${{ needs.release.outputs.version }}
            type=raw,value=latest

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
