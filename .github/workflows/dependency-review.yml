name: Dependency Review

on:
  pull_request:
    branches: [main, develop]

permissions:
  contents: read
  pull-requests: write

jobs:
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    # Requires GitHub Dependency Graph (Advanced Security) to be enabled in repo settings.
    # continue-on-error allows the PR to merge even when the feature is not yet enabled.
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          # Fail on high/critical severity vulnerabilities
          fail-on-severity: high
          # Comment summary on the PR
          comment-summary-in-pr: always
          # Deny licenses that are incompatible with this project (SPDX identifiers)
          deny-license-ids: GPL-2.0-only, GPL-2.0-or-later, GPL-3.0-only, GPL-3.0-or-later, AGPL-3.0-only, AGPL-3.0-or-later
          # Retry if no dependency snapshot exists yet for this commit
          retry-on-snapshot-warnings: true
          retry-on-snapshot-warnings-timeout: 120
