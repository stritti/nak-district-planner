name: Dependency Review

on:
  pull_request:
    branches: [main, develop]

permissions:
  contents: read
  pull-requests: write

jobs:
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    # Requires GitHub Dependency Graph (Advanced Security) to be enabled in repo settings.
    # continue-on-error allows the PR to merge even when the feature is not yet enabled.
    continue-on-error: true

    steps:
      - uses: actions/checkout@v6

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          # Fail on high/critical severity vulnerabilities
          fail-on-severity: high
          # Comment summary on the PR
          comment-summary-in-pr: always
          # Deny licenses that are incompatible with this project
          deny-licenses: GPL-2.0, GPL-3.0, AGPL-3.0
          # Retry if dependency snapshots are not yet available for the head SHA
          retry-on-snapshot-warnings: true
